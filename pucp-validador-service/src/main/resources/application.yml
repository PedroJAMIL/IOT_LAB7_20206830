spring:
  application:
    name: pucp-validador-service

server:
  port: 8001

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  info:
    env:
      enabled: true

info:
  app:
    name: pucp-validador-service
    description: Microservicio de validacion de identidad academica PUCP y PIN de candados IoT
    version: 1.0.0
